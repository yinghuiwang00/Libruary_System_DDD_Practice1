server:
  port: 0

spring:
  application:
    name: library-notification-test
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

springdoc:
  api-docs:
    enabled: false

---
# EmbeddedKafka 集成测试专用 profile
# 在测试类上使用 @ActiveProfiles("embedded-kafka") 激活
spring:
  config:
    activate:
      on-profile: embedded-kafka
  autoconfigure:
    exclude: []
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
    consumer:
      group-id: library-notification
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # value-deserializer 使用 StringDeserializer：Consumer 手动解析 JSON（防腐层设计）
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
