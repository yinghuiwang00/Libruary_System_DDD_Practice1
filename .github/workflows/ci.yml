name: CI Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build all modules
        run: mvn clean install -DskipTests -B

      - name: Run tests (library-shared)
        run: mvn test -pl library-shared -B

      - name: Run tests (library-catalog)
        run: mvn test -pl library-catalog -B

      - name: Run tests (library-inventory)
        run: mvn test -pl library-inventory -B

      - name: Run tests (library-circulation)
        run: mvn test -pl library-circulation -B

      - name: Run tests (library-patron)
        run: mvn test -pl library-patron -B

      - name: Run tests (library-payment)
        run: mvn test -pl library-payment -B

      - name: Run tests (library-analytics)
        run: mvn test -pl library-analytics -B

      - name: Run tests (library-notification)
        run: mvn test -pl library-notification -B

      - name: Run tests (library-e2e-test)
        run: mvn test -pl library-e2e-test -B

      - name: Run tests (library-integration-test)
        run: mvn test -pl library-integration-test -B

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: '*/target/surefire-reports/*.txt'
          retention-days: 7

  staging:
    needs: build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      zookeeper:
        image: confluentinc/cp-zookeeper:7.5.0
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
        ports:
          - 2181:2181

      kafka:
        image: confluentinc/cp-kafka:7.5.0
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:29092
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
        ports:
          - 29092:29092
        options: >-
          --health-cmd "kafka-topics --bootstrap-server localhost:29092 --list"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build all modules
        run: mvn clean install -DskipTests -B

      - name: Create staging database
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -c "CREATE DATABASE library_staging_test;"

      - name: Run staging tests
        env:
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
        run: mvn test -Pstaging -pl library-staging-test -B

      - name: Upload staging test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: staging-test-reports
          path: '*/target/surefire-reports/*.txt'
          retention-days: 7
